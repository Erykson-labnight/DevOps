<!-- index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fase2 E-Commerce</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 1rem;
            text-align: center;
        }
        .products {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 2rem;
        }
        .product {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin: 1rem;
            padding: 1rem;
            width: 200px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .product img {
            max-width: 100%;
            border-radius: 5px;
        }
        .product h3 {
            font-size: 1.1rem;
            margin: 0.5rem 0;
        }
        .product p {
            color: #555;
            font-size: 0.9rem;
        }
        .buy-btn {
            display: inline-block;
            margin-top: 0.5rem;
            padding: 0.5rem 1rem;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            text-decoration: none;
        }
        .buy-btn:hover {
            background-color: #45a049;
        }
        footer {
            text-align: center;
            padding: 1rem;
            background-color: #222;
            color: white;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Fase2 E-Commerce Demo</h1>
    </header>

    <div class="products">
        <div class="product">
            <img src="https://via.placeholder.com/150" alt="Producto 1">
            <h3>Producto 1</h3>
            <p>$100.00</p>
            <a href="#" class="buy-btn">Comprar</a>
        </div>
        <div class="product">
            <img src="https://via.placeholder.com/150" alt="Producto 2">
            <h3>Producto 2</h3>
            <p>$150.00</p>
            <a href="#" class="buy-btn">Comprar</a>
        </div>
        <div class="product">
            <img src="https://via.placeholder.com/150" alt="Producto 3">
            <h3>Producto 3</h3>
            <p>$200.00</p>
            <a href="#" class="buy-btn">Comprar</a>
        </div>
    </div>

    <footer>
        &copy; 2026 Fase2 E-Commerce. Todos los derechos reservados.
    </footer>
</body>
</html>
